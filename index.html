  }

  if(src==='stock'){pushUndo();A.gs=klDraw(A.gs);A.moves++;A.floorUndosUsed=Math.max(0,A.floorUndosUsed-1);render();return;}
  if(src==='sp-stock'){pushUndo();A.gs=spDeal(A.gs);A.moves++;checkWin();render();return;}
  if(src==='tp-stock'){pushUndo();tpDrawStock();A.moves++;render();return;}
  if(src==='py-stock'){pushUndo();A.gs=pyDrawStock(A.gs);A.moves++;render();return;}

  if(t==='tripeaks'&&src==='pycard'){
    pushUndo();const gs=A.gs;const wasteTop=gs.waste.length?gs.waste[gs.waste.length-1]:null;const card=gs.pyramid[idx];
    if(tpFree(gs.pyramid,idx)&&tpCanPlay(card,wasteTop)){
      const srcEl=document.querySelector(`[data-src="pycard"][data-idx="${idx}"]`);const srcRect=srcEl?srcEl.getBoundingClientRect():null;const cardInner=srcEl?srcEl.innerHTML:'';const cardCls=isRed(card.suit)?'red':'blk';
      const s=cloneState(gs);s.waste.push({...s.pyramid[idx],faceUp:true});s.pyramid[idx]=null;tpUpdateFaceUp(s.pyramid);A.gs=s;A.moves++;
      A.tpStreak=(A.tpStreak||0)+1;addScore(A.tpStreak);if(idx<3)addScore(15);
      _skipNextAnim=true;render();
      if(srcRect){const wasteSlot=document.getElementById('tp-waste-slot');const destRect=wasteSlot?wasteSlot.getBoundingClientRect():null;if(destRect){const d=document.createElement('div');d.className=`card ${cardCls} fly-card`;d.innerHTML=cardInner;d.style.left=srcRect.left+'px';d.style.top=srcRect.top+'px';d.style.width=srcRect.width+'px';d.style.height=srcRect.height+'px';document.body.appendChild(d);requestAnimationFrame(()=>requestAnimationFrame(()=>{d.style.left=destRect.left+'px';d.style.top=destRect.top+'px';d.style.width=destRect.width+'px';d.style.height=destRect.height+'px';}));setTimeout(()=>d.remove(),320);}}
      if(tpWon(A.gs))handleWin();
    } else {A.tpStreak=0;render();}
    return;
  }
  if(t==='pyramid'){handlePyramidClick(src,idx);return;}

  // ── If a card is already selected, try to move to clicked destination ──
  if(A.sel){
    // Clicking the already-selected card deselects it
    const same=(A.sel.type==='tab'&&src==='tab'&&A.sel.col===col&&A.sel.idx===idx)
             ||(A.sel.type==='waste'&&src==='waste')
             ||(A.sel.type==='fc'&&src==='fc'&&A.sel.col===col);
    if(same){A.sel=null;render();return;}
    // Try explicit destination click
    if(tryMoveFromSel(src,col,idx)){A.sel=null;render();return;}
    // Failed — re-select the newly clicked card instead
    A.sel=null;
    if(!tryAutoMove(src,col,idx)) trySelect(src,col,idx);
    render();
    return;
  }

  // ── No selection: try smart auto-move first ──
  if(!tryAutoMove(src,col,idx)) trySelect(src,col,idx);
  render();
}

// ═══════════════════════════════════════════════════════════
//  SMART SINGLE-CLICK AUTO-MOVE
//  Priority: Foundation > non-empty tableau > empty tableau > freecell
//  Only auto-moves when the destination is unambiguous (exactly one
//  good option). Falls back to selection mode when multiple valid
//  non-empty targets exist so the player can choose.
// ═══════════════════════════════════════════════════════════
function tryAutoMove(src,col,idx){
  const t=A.gtype;
  if(t==='klondike') return autoMoveKlondike(src,col,idx);
  if(t==='spider')   return autoMoveSpider(src,col,idx);
  if(t==='freecell') return autoMoveFreecell(src,col,idx);
  return false;
}

function autoMoveKlondike(src,col,idx){
  const gs=A.gs;
  let cards=[];
  if(src==='waste'&&gs.waste.length){
    cards=[{...gs.waste[gs.waste.length-1]}];
  } else if(src==='tab'){
    const pile=gs.tableau[col];
    if(!pile||!pile[idx]||!pile[idx].faceUp) return false;
    cards=pile.slice(idx).map(c=>({...c}));
  } else return false;
  if(!cards.length) return false;

  // 1. Foundation (single card only)
  if(cards.length===1){
    const card=cards[0];
    if(klCanFoundation(card,gs.foundations)){
      pushUndo();
      const s=cloneState(gs);
      if(src==='waste') s.waste.pop(); else s.tableau[col].pop();
      s.foundations[card.suit].push(card);
      klAutoReveal(s);
      A.gs=s; A.moves++; addScore(src==='waste'?15:10);
      if(klWon(A.gs)) handleWin();
      return true;
    }
  }

  // 2. Tableau — collect all valid columns
  const validCols=[];
  for(let d=0;d<7;d++){
    if(src==='tab'&&d===col) continue;
    if(klCanTableau(cards,gs.tableau[d])) validCols.push(d);
  }
  if(!validCols.length) return false;

  // Prefer non-empty targets (preserve empty columns)
  const nonEmpty=validCols.filter(d=>gs.tableau[d].length>0);
  // Ambiguous if multiple non-empty valid targets
  if(nonEmpty.length>1) return false;

  const target = nonEmpty.length===1 ? nonEmpty[0] : validCols[0];
  pushUndo();
  const s=cloneState(gs);
  if(src==='waste') s.waste.pop(); else s.tableau[col].splice(idx);
  s.tableau[target].push(...cards);
  klAutoReveal(s);
  A.gs=s; A.moves++; addScore(10);
  if(klWon(A.gs)) handleWin();
  return true;
}

function autoMoveSpider(src,col,idx){
  const gs=A.gs;
  if(src!=='tab') return false;
  const pile=gs.tableau[col];
  if(!pile||!pile[idx]||!pile[idx].faceUp) return false;
  const seqLen=spSeqLen(pile);
  if(idx < pile.length-seqLen) return false;
  const cards=pile.slice(idx);

  const validCols=[];
  for(let d=0;d<gs.tableau.length;d++){
    if(d===col) continue;
    if(spCanDrop(cards,gs.tableau[d])) validCols.push(d);
  }
  if(!validCols.length) return false;

  // Prefer same-suit match at destination top
  const suit=cards[0].suit;
  const sameSuit=validCols.filter(d=>{
    const tp=gs.tableau[d];
    return tp.length && tp[tp.length-1].suit===suit;
  });
  const nonEmpty=validCols.filter(d=>gs.tableau[d].length>0);

  let target;
  if(sameSuit.length===1)       target=sameSuit[0];
  else if(sameSuit.length>1)    return false;
  else if(nonEmpty.length===1)  target=nonEmpty[0];
  else if(nonEmpty.length>1)    return false;
  else if(validCols.length===1) target=validCols[0];
  else                          return false;

  pushUndo();
  const s=cloneState(gs);
  const moved=s.tableau[col].splice(idx);
  s.tableau[target].push(...moved);
  if(s.tableau[col].length) s.tableau[col][s.tableau[col].length-1].faceUp=true;
  for(let c=0;c<s.tableau.length;c++){
    const csuit=spCheckComplete(s.tableau[c]);
    if(csuit!==false){s.tableau[c].splice(s.tableau[c].length-13);s.foundations.push(csuit);addScore(100);}
  }
  A.gs=s; A.moves++;
  if(spWon(A.gs)) handleWin();
  return true;
}

function autoMoveFreecell(src,col,idx){
  const gs=A.gs;
  let card=null; let cards=[];
  if(src==='fc'){
    card=gs.freecells[col]; if(!card) return false; cards=[card];
  } else if(src==='tab'){
    const pile=gs.tableau[col];
    if(!pile||!pile.length||idx>=pile.length) return false;
    cards=pile.slice(idx);
    for(let i=0;i<cards.length-1;i++){
      const u=cards[i],l=cards[i+1];
      if(u.rank!==l.rank+1||isRed(u.suit)===isRed(l.suit)) return false;
    }
    if(cards.length>fcMaxMovable(gs)) return false;
    card=cards[0];
  } else return false;
  if(!cards.length) return false;

  // 1. Foundation
  if(cards.length===1 && fcCanFoundation(card,gs.foundations)){
    pushUndo(); const s=cloneState(gs);
    if(src==='fc') s.freecells[col]=null; else s.tableau[col].splice(idx);
    s.foundations[card.suit].push(card);
    A.gs=s; A.moves++; addScore(5);
    if(fcWon(A.gs)) handleWin();
    return true;
  }

  // 2. Non-empty tableau
  const validTab=[];
  for(let d=0;d<8;d++){
    if(src==='tab'&&d===col) continue;
    if(fcCanTableau(card,gs.tableau[d])) validTab.push(d);
  }
  const nonEmpty=validTab.filter(d=>gs.tableau[d].length>0);
  if(nonEmpty.length===1){
    pushUndo(); const s=cloneState(gs);
    if(src==='fc') s.freecells[col]=null; else s.tableau[col].splice(idx);
    s.tableau[nonEmpty[0]].push(...cards);
    A.gs=s; A.moves++;
    if(fcWon(A.gs)) handleWin();
    return true;
  }
  if(nonEmpty.length>1) return false;

  // 3. Single empty column
  if(validTab.length===1){
    pushUndo(); const s=cloneState(gs);
    if(src==='fc') s.freecells[col]=null; else s.tableau[col].splice(idx);
    s.tableau[validTab[0]].push(...cards);
    A.gs=s; A.moves++;
    if(fcWon(A.gs)) handleWin();
    return true;
  }

  // 4. Freecell parking (no tableau option)
  if(cards.length===1 && !validTab.length){
    const freeIdx=gs.freecells.findIndex(c=>!c);
    if(freeIdx>=0){
      pushUndo(); const s=cloneState(gs);
      if(src==='fc') s.freecells[col]=null; else s.tableau[col].splice(idx);
      s.freecells[freeIdx]=card;
      A.gs=s; A.moves++;
      return true;
    }
  }
  return false;
}

function handleDblClick(e){
  const el=e.target.closest('[data-src]');if(!el)return;
  const src=el.dataset.src;const col=parseInt(el.dataset.col)||0;const idx=parseInt(el.dataset.idx)||0;
  const t=A.gtype,gs=A.gs;let card=null;
  if(t==='klondike'){if(src==='waste'&&gs.waste.length)card=gs.waste[gs.waste.length-1];else if(src==='tab'&&gs.tableau[col]?.length){const p=gs.tableau[col];if(p[p.length-1].faceUp)card=p[p.length-1];}}
  else if(t==='spider'){if(src==='tab'&&gs.tableau[col]?.length){const p=gs.tableau[col];card=p[p.length-1];}}
  else if(t==='freecell'){if(src==='fc'&&gs.freecells[col])card=gs.freecells[col];else if(src==='tab'&&gs.tableau[col]?.length){const p=gs.tableau[col];card=p[p.length-1];}}
  if(!card)return;
  pushUndo();let moved=false;
  if(t==='klondike'){if(klCanFoundation(card,gs.foundations)){const s=cloneState(gs);if(src==='waste')s.waste.pop();else s.tableau[col].pop();s.foundations[card.suit].push(card);klAutoReveal(s);A.gs=s;A.moves++;addScore(src==='waste'?15:10);if(klWon(A.gs))handleWin();moved=true;}}
  else if(t==='freecell'){if(fcCanFoundation(card,gs.foundations)){const s=cloneState(gs);if(src==='fc')s.freecells[col]=null;else s.tableau[col].pop();s.foundations[card.suit].push(card);A.gs=s;A.moves++;addScore(5);if(fcWon(A.gs))handleWin();moved=true;}}
  else if(t==='spider'){if(src==='tab'){const seqLen=spSeqLen(gs.tableau[col]);if(seqLen===13&&spCheckComplete(gs.tableau[col])){const s=cloneState(gs);const suit=s.tableau[col][s.tableau[col].length-1].suit;s.tableau[col].splice(s.tableau[col].length-13);s.foundations.push(suit);addScore(100);if(s.tableau[col].length)s.tableau[col][s.tableau[col].length-1].faceUp=true;A.gs=s;A.moves++;if(spWon(A.gs))handleWin();moved=true;}}}
  if(moved){A.sel=null;render();}else A.undoStack.pop();
}

function handlePyramidClick(src,idx){

        const cap=captureRect(A.sel.idx);const wasteEl=document.querySelector('[data-src="py-waste"]');const wasteR=wasteEl?{rect:wasteEl.getBoundingClientRect(),inner:wasteEl.innerHTML,cls:wasteEl.className}:null;
        pushUndo();const s=cloneState(gs);s.waste.pop();s.pyramid[A.sel.idx]=null;A.gs=s;A.moves++;A.sel=null;addScore(10);updatePyFaceUp(A.gs);if(pyWon(A.gs))handleWin();_skipNextAnim=true;render();launchOff(cap);launchOff(wasteR);
      }else{A.sel=null;render();}

    if(card.rank===13){const cap=captureRect(idx);pushUndo();const s=cloneState(gs);s.pyramid[idx]=null;A.gs=s;A.moves++;A.sel=null;addScore(5);updatePyFaceUp(A.gs);if(pyWon(A.gs))handleWin();_skipNextAnim=true;render();launchOff(cap);return;}

      if(A.sel.type==='pycard'&&A.sel.idx===idx){A.sel=null;render();return;}
      if(A.sel.type==='pycard'){const other=gs.pyramid[A.sel.idx];const{r:or,c:oc}=getRowCol(A.sel.idx);const otherFree=!pyBlocked(gs.pyramid,or,oc);if(other&&otherFree&&other.rank+card.rank===13){const cap1=captureRect(idx);const cap2=captureRect(A.sel.idx);pushUndo();const s=cloneState(gs);s.pyramid[idx]=null;s.pyramid[A.sel.idx]=null;A.gs=s;A.moves++;A.sel=null;addScore(10);updatePyFaceUp(A.gs);if(pyWon(A.gs))handleWin();_skipNextAnim=true;render();launchOff(cap1);launchOff(cap2);return;}}
      if(A.sel.type==='waste-py'){const wasteTop=gs.waste[gs.waste.length-1];if(wasteTop&&wasteTop.rank+card.rank===13){const cap=captureRect(idx);const wasteEl=document.querySelector('[data-src="py-waste"]');const wasteR=wasteEl?{rect:wasteEl.getBoundingClientRect(),inner:wasteEl.innerHTML,cls:wasteEl.className}:null;pushUndo();const s=cloneState(gs);s.waste.pop();s.pyramid[idx]=null;A.gs=s;A.moves++;A.sel=null;addScore(10);updatePyFaceUp(A.gs);if(pyWon(A.gs))handleWin();_skipNextAnim=true;render();launchOff(cap);launchOff(wasteR);return;}}
      A.sel={type:'pycard',idx};

function getRowCol(idx){let r=0,n=0;while(n+r+1<=idx){n+=r+1;r++;}return{r,c:idx-n};}
function updatePyFaceUp(gs){for(let r=6;r>=0;r--)for(let c=0;c<=r;c++){const idx=pyIdx(r,c);if(gs.pyramid[idx]&&!pyBlocked(gs.pyramid,r,c))gs.pyramid[idx].faceUp=true;}}

function trySelect(src,col,idx){
  const t=A.gtype,gs=A.gs;
if(t==='klondike'){if(src==='waste'&&gs.waste.length){A.sel={type:'waste',col:-1,idx:-1};return;}if(src==='tab'){const pile=gs.tableau[col];if(pile[idx]&&pile[idx].faceUp){A.sel={type:'tab',col,idx};return;}}if(src==='found'){const f=gs.foundations[col];if(f&&f.length){A.sel={type:'found',col,idx:-1};return;}}}  if(t==='spider'){if(src==='tab'){const pile=gs.tableau[col];if(pile[idx]&&pile[idx].faceUp){
    // Only allow selection from the start of a valid same-suit sequence
    const seqLen=spSeqLen(pile);const seqStart=pile.length-seqLen;
    if(idx>=seqStart){A.sel={type:'tab',col,idx};return;}
  }}}
  if(t==='freecell'){if(src==='tab'){const pile=gs.tableau[col];if(pile.length&&pile[idx]&&pile[idx].faceUp){A.sel={type:'tab',col,idx};return;}}if(src==='fc'){if(gs.freecells[col]){A.sel={type:'fc',col,idx:-1};return;}}}
  if(src==='found'){const f=gs.foundations[col];if(f&&f.length){A.sel={type:'found',col,idx:-1};return;}}
}

function tryMoveFromSel(targetSrc,targetCol,targetIdx){
  const t=A.gtype;const s=A.sel;if(!s)return false;
  if(t==='klondike')return klMove(s,targetSrc,targetCol);
  if(t==='spider')return spMove(s,targetSrc,targetCol);
  if(t==='freecell')return fcMove(s,targetSrc,targetCol);
  return false;
}

function klMove(sel,targetSrc,targetCol){
  const gs=A.gs;let cards=[];
if(sel.type==='waste')cards=[{...gs.waste[gs.waste.length-1]}];
else if(sel.type==='tab')cards=gs.tableau[sel.col].slice(sel.idx).map(c=>({...c}));
else if(sel.type==='found'){const f=gs.foundations[sel.col];if(f&&f.length)cards=[{...f[f.length-1]}];}
if(!cards.length)return false;
  // Toolbox as destination
  if(targetSrc==='toolbox'&&!A.toolboxCard&&A.toolboxUses>0&&cards.length===1){
    pushUndo();const s=cloneState(gs);
    if(sel.type==='waste')s.waste.pop();else s.tableau[sel.col].pop();
    klAutoReveal(s);A.gs=s;A.toolboxCard={...cards[0]};A.toolboxUses--;A.moves++;return true;
  }
  // Toolbox card as source (drag from toolbox)
  if(targetSrc==='tab'&&sel.type==='toolbox'&&A.toolboxCard){
    const tc=A.toolboxCard;
    if(!klCanTableau([tc],gs.tableau[targetCol]))return false;
    pushUndo();const s=cloneState(gs);s.tableau[targetCol].push({...tc});A.toolboxCard=null;A.moves++;A.gs=s;return true;
  }
  if(targetSrc==='tab'){if(!klCanTableau(cards,gs.tableau[targetCol]))return false;pushUndo();const s=cloneState(gs);if(sel.type==='waste')s.waste.pop();else if(sel.type==='found')s.foundations[sel.col].pop();else s.tableau[sel.col].splice(sel.idx);s.tableau[targetCol].push(...cards);klAutoReveal(s);A.gs=s;A.moves++;addScore(10);if(klWon(A.gs))handleWin();return true;}
  if(targetSrc==='found'){if(cards.length>1)return false;const card=cards[0];if(!klCanFoundation(card,gs.foundations))return false;pushUndo();const s=cloneState(gs);if(sel.type==='waste')s.waste.pop();else s.tableau[sel.col].pop();s.foundations[card.suit].push(card);klAutoReveal(s);A.gs=s;A.moves++;addScore(sel.type==='waste'?15:10);if(klWon(A.gs))handleWin();return true;}
  return false;
}

function spMove(sel,targetSrc,targetCol){
  const gs=A.gs;if(sel.type!=='tab')return false;if(targetSrc!=='tab'&&targetSrc!=='toolbox')return false;
  if(targetSrc==='toolbox'&&!A.toolboxCard&&A.toolboxUses>0){
    const pile=gs.tableau[sel.col];const cards=pile.slice(sel.idx);if(cards.length>1)return false;
    pushUndo();const s=cloneState(gs);s.tableau[sel.col].pop();if(s.tableau[sel.col].length)s.tableau[sel.col][s.tableau[sel.col].length-1].faceUp=true;
    A.gs=s;A.toolboxCard={...cards[0]};A.toolboxUses--;A.moves++;return true;
  }
  if(targetCol===sel.col)return false;
  const seqLen=spSeqLen(gs.tableau[sel.col]);const topIdx=gs.tableau[sel.col].length-seqLen;if(sel.idx<topIdx)return false;
  const cards=gs.tableau[sel.col].slice(sel.idx);const tp=gs.tableau[targetCol];if(!spCanDrop(cards,tp))return false;
  pushUndo();const s=cloneState(gs);const moved=s.tableau[sel.col].splice(sel.idx);s.tableau[targetCol].push(...moved);
  if(s.tableau[sel.col].length)s.tableau[sel.col][s.tableau[sel.col].length-1].faceUp=true;
  for(let c=0;c<s.tableau.length;c++){const suit=spCheckComplete(s.tableau[c]);if(suit!==false){s.tableau[c].splice(s.tableau[c].length-13);s.foundations.push(suit);addScore(100);}}
  A.gs=s;A.moves++;if(spWon(A.gs))handleWin();return true;
}

function fcMove(sel,targetSrc,targetCol){
  const gs=A.gs;let card=null;let cards=[];
  if(sel.type==='fc'){card=gs.freecells[sel.col];if(!card)return false;cards=[card];}
  else if(sel.type==='tab'){const pile=gs.tableau[sel.col];if(!pile.length)return false;cards=pile.slice(sel.idx);for(let i=0;i<cards.length-1;i++){const u=cards[i],l=cards[i+1];if(u.rank!==l.rank+1||isRed(u.suit)===isRed(l.suit))return false;}if(cards.length>fcMaxMovable(gs))return false;card=cards[0];}
  else if(sel.type==='found'){const f=gs.foundations[sel.col];if(f&&f.length){card=f[f.length-1];cards=[card];}}
  if(!cards.length)return false;
  if(targetSrc==='toolbox'&&!A.toolboxCard&&A.toolboxUses>0&&cards.length===1){
    pushUndo();const s=cloneState(gs);if(sel.type==='fc')s.freecells[sel.col]=null;else s.tableau[sel.col].splice(sel.idx);A.gs=s;A.toolboxCard={...card};A.toolboxUses--;A.moves++;return true;
  }
  if(targetSrc==='fc'){if(cards.length>1)return false;if(gs.freecells[targetCol]!==null)return false;pushUndo();const s=cloneState(gs);if(sel.type==='fc')s.freecells[sel.col]=null;else if(sel.type==='found')s.foundations[sel.col].pop();else s.tableau[sel.col].splice(sel.idx);s.freecells[targetCol]=card;A.gs=s;A.moves++;return true;}
  if(targetSrc==='found'){if(cards.length>1)return false;if(!fcCanFoundation(card,gs.foundations))return false;pushUndo();const s=cloneState(gs);if(sel.type==='fc')s.freecells[sel.col]=null;else if(sel.type==='found')s.foundations[sel.col].pop();else s.tableau[sel.col].splice(sel.idx);s.foundations[card.suit].push(card);A.gs=s;A.moves++;addScore(5);if(fcWon(A.gs))handleWin();return true;}
  if(targetSrc==='tab'){const tp=gs.tableau[targetCol];if(!fcCanTableau(card,tp))return false;if(targetCol===sel.col&&sel.type==='tab')return false;pushUndo();const s=cloneState(gs);if(sel.type==='fc')s.freecells[sel.col]=null;else if(sel.type==='found')s.foundations[sel.col].pop();else s.tableau[sel.col].splice(sel.idx);s.tableau[targetCol].push(...cards);A.gs=s;A.moves++;if(fcWon(A.gs))handleWin();return true;}
  return false;
}

function handleDragStart(e){
  const el=e.target.closest('[draggable="true"][data-src]');if(!el)return;
  const src=el.dataset.src;const col=parseInt(el.dataset.col)||0;const idx=parseInt(el.dataset.idx)||0;
  const t=A.gtype,gs=A.gs;let cards=[];let selInfo=null;
  if(src==='toolbox'&&A.toolboxCard){cards=[{...A.toolboxCard}];selInfo={type:'toolbox',col:0,idx:0};}
  else if(t==='klondike'){if(src==='waste'&&gs.waste.length){cards=[{...gs.waste[gs.waste.length-1]}];selInfo={type:'waste',col:-1,idx:-1};}else if(src==='found'&&gs.foundations[col]&&gs.foundations[col].length){cards=[{...gs.foundations[col][gs.foundations[col].length-1]}];selInfo={type:'found',col,idx:-1};}else if(src==='tab'){cards=gs.tableau[col].slice(idx).map(c=>({...c}));selInfo={type:'tab',col,idx};}}
  else if(t==='spider'&&src==='tab'){const seqLen=spSeqLen(gs.tableau[col]);const topIdx=gs.tableau[col].length-seqLen;if(idx>=topIdx){cards=gs.tableau[col].slice(idx).map(c=>({...c}));selInfo={type:'tab',col,idx};}}
  else if(t==='freecell'){if(src==='fc'&&gs.freecells[col]){cards=[{...gs.freecells[col]}];selInfo={type:'fc',col,idx:-1};}else if(src==='found'&&gs.foundations[col]&&gs.foundations[col].length){cards=[{...gs.foundations[col][gs.foundations[col].length-1]}];selInfo={type:'found',col,idx:-1};}else if(src==='tab'){const pile=gs.tableau[col];if(pile.length&&idx<pile.length){const c2=pile.slice(idx);let valid=true;for(let i=0;i<c2.length-1;i++){if(c2[i].rank!==c2[i+1].rank+1||isRed(c2[i].suit)===isRed(c2[i+1].suit)){valid=false;break;}}if(valid&&c2.length<=fcMaxMovable(gs)){cards=c2.map(c=>({...c}));selInfo={type:'tab',col,idx};}}}}
  if(!cards.length){e.preventDefault();return;}
  DR={active:true,cards,src:selInfo};A.sel=selInfo;e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text/plain','card');
  setTimeout(()=>el.classList.add('dragging'),0);
}
function handleDragOver(e){const el=e.target.closest('[data-src]');if(!el||!DR.active)return;e.preventDefault();e.dataTransfer.dropEffect='move';}
function handleDrop(e){
  e.preventDefault();if(!DR.active||!DR.src)return;const el=e.target.closest('[data-src]');if(!el)return;
  const tgt=el.dataset.src;const tcol=parseInt(el.dataset.col)||0;
  if(tryMoveFromSel(tgt,tcol,0)){A.sel=null;}
  DR={active:false,cards:null,src:null};_skipNextAnim=true;render();
}
function handleDragEnd(e){DR={active:false,cards:null,src:null};document.querySelectorAll('.dragging').forEach(el=>el.classList.remove('dragging'));}

// ═══════════════════════════════════════════════════════════
//  GAME FLOW
// ═══════════════════════════════════════════════════════════
function startGame(type,floor){
  A.gtype=type;A.floor=floor;A.moves=0;A.undoStack=[];A.sel=null;A.winOverlay=false;A.paused=false;
  A.itemMode=null;A.hints=[];A.hintTargets=[];A.hintUntil=0;A.revealAllUntil=0;A.pickerOverlay=null;
  // Per-floor tracking
  A.floorStartLives=A.lives;A.floorUndosUsed=0;A.floorStartTime=Date.now();A.floorStartScore=A.score;
  A.toolboxCard=null;A.toolboxUses=0;
  if(type==='klondike')A.gs=initKlondike(floor);
  else if(type==='spider')A.gs=initSpider(floor);
  else if(type==='tripeaks')A.gs=initTripeaks(floor);
  else if(type==='pyramid')A.gs=initPyramid(floor);
  else if(type==='freecell')A.gs=initFreecell(floor);
  if(A.timerElapsed>0&&!A.timerRunning){A.timerStart=Date.now()-A.timerElapsed;A.timerRunning=true;}
  A.screen='game';render();
}

function handleWin(){A.winOverlay=true;}
function instaWin(){A.winOverlay=true;render();}

function nextFloor(){
  A.done.add(A.floor);addScore(100*(10-A.floor));A.tpStreak=0;
  if(A.floor>=9){stopTimer();A.screen='victory';render();return;}
  // Calculate gold and go to shop
  A.shopGoldBreakdown=calcFloorGoldBreakdown();
  A.shopGoldEarned=A.shopGoldBreakdown.reduce((a,b)=>a+(b.earned?b.amount:0),0);
  A.gold+=A.shopGoldEarned;
  A.shopItems=generateShopItems();
  A.floor++;
  A.screen='shop';render();
}

function abandonGame(){
  if(A.inventory.some(i=>i.effect==='no-life-abandon')){
    if(confirm('Use Fire Extinguisher? Abandon safely with no life penalty!')){
      const idx=A.inventory.findIndex(i=>i.effect==='no-life-abandon');
      A.inventory.splice(idx,1);
      A.sel=null;A.winOverlay=false;A.tpStreak=0;A.itemMode=null;A.screen='map';render();return;
    }
  }
  if(!confirm('Abandon this floor? You will lose a life.'))return;
  A.lives--;A.sel=null;A.winOverlay=false;A.tpStreak=0;A.itemMode=null;
  if(A.lives<=0){stopTimer();A.screen='gameover';render();return;}
  A.screen='map';render();
}

function newShuffle(){
  if(!confirm('New Shuffle? Costs 1 life.'))return;
  A.lives--;A.sel=null;A.winOverlay=false;A.tpStreak=0;A.itemMode=null;
  if(A.lives<=0){stopTimer();A.screen='gameover';render();return;}
  A.undoStack=[];A.moves=0;A.floorUndosUsed=0;A.floorStartTime=Date.now();A.floorStartScore=A.score;
  const t=A.gtype,f=A.floor;
  if(t==='klondike')A.gs=initKlondike(f);else if(t==='spider')A.gs=initSpider(f);
  else if(t==='tripeaks')A.gs=initTripeaks(f);else if(t==='pyramid')A.gs=initPyramid(f);
  else if(t==='freecell')A.gs=initFreecell(f);
  render();
}

function pushUndo(){
  A.undoStack.push({gs:cloneState(A.gs),sel:A.sel?{...A.sel}:null,moves:A.moves});
  if(A.undoStack.length>50)A.undoStack.shift();
}
function undoMove(){
  const budget=A.bonusUndos>0?Infinity:A.undoStack.length;
  if(!A.undoStack.length)return;
  const prev=A.undoStack.pop();A.gs=prev.gs;A.sel=prev.sel;A.moves=prev.moves;A.winOverlay=false;
  if(A.bonusUndos>0)A.bonusUndos--;else A.floorUndosUsed++;
  render();
}
function checkWin(){
  const t=A.gtype,gs=A.gs;if(!gs)return;
  if(t==='klondike'&&klWon(gs))handleWin();if(t==='spider'&&spWon(gs))handleWin();
  if(t==='tripeaks'&&tpWon(gs))handleWin();if(t==='pyramid'&&pyWon(gs))handleWin();
  if(t==='freecell'&&fcWon(gs))handleWin();
}

// ═══════════════════════════════════════════════════════════
//  SCORING & TIMER
// ═══════════════════════════════════════════════════════════
function addScore(n){A.score=Math.max(0,(A.score||0)+n);startTimer();}
function startTimer(){if(!A.timerRunning&&!A.timerStart){A.timerStart=Date.now()-A.timerElapsed;A.timerRunning=true;}}
function stopTimer(){if(A.timerRunning){A.timerElapsed=Date.now()-A.timerStart;A.timerRunning=false;}}
function getElapsed(){if(!A.timerStart&&!A.timerElapsed)return 0;if(A.timerRunning)return Date.now()-A.timerStart;return A.timerElapsed;}
function fmtTime(ms){const s=Math.floor(ms/1000);const h=Math.floor(s/3600);const m=Math.floor((s%3600)/60);const sc=s%60;return`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sc).padStart(2,'0')}`;}

// ── LEADERBOARD ───────────────────────────────────────────
async function saveScore(name){
  const entry={name:name.trim().substring(0,20)||'Anonymous',score:A.score,time:getElapsed(),date:Date.now()};
  try{if(window._fbSave)await window._fbSave(entry.name,entry.score,entry.time);}catch(e){console.error('Failed to save:',e);}
  return loadBoard();
}
async function loadBoard(){try{if(window._fbLoad)return await window._fbLoad();return[];}catch(e){return[];}}

// ── END SCREENS ────────────────────────────────────────────
function renderNameEntry(app,isVictory){
  const elapsed=getElapsed();
  app.innerHTML=`<div class="end-screen ${isVictory?'':'lose-screen'}">
    <div class="ne-window">
      <div class="ne-title">${isVictory?'🚪 YOU ESCAPED!':'💀 GAME OVER'}</div>
      <div class="ne-body">
        <div class="ne-stats">
          <div class="ne-stat"><span class="ne-stat-lbl">SCORE</span><span class="ne-stat-val">${A.score.toLocaleString()}</span></div>
          <div class="ne-stat"><span class="ne-stat-lbl">TIME</span><span class="ne-stat-val">${fmtTime(elapsed)}</span></div>
          <div class="ne-stat"><span class="ne-stat-lbl">GOLD</span><span class="ne-stat-val" style="color:#886600">${A.gold}🪙</span></div>
        </div>
        <div class="ne-form">
          <label class="ne-label">ENTER YOUR NAME:</label>
          <input class="ne-input" id="pname" type="text" maxlength="20" placeholder="PLAYER_1" autocomplete="off" spellcheck="false"/>
          <button class="btn" id="submit-score-btn" onclick="submitScore(${isVictory})">[ SUBMIT ]</button>
        </div>
      </div>
    </div>
    <div class="lb-window" id="lb-container">
      <div class="lb-title">🏆 HIGH SCORES</div>
      <div class="lb-body" id="lb-body"><div style="font-family:var(--pixel);color:#aaa;font-size:18px">Loading...</div></div>
    </div>
  </div>`;
  setTimeout(()=>{const inp=document.getElementById('pname');if(inp){inp.focus();inp.addEventListener('keydown',e=>{if(e.key==='Enter')submitScore(isVictory);});}},100);
  loadBoard().then(renderBoard);
}
function renderBoard(board){
  const el=document.getElementById('lb-body');if(!el)return;
  if(!board.length){el.innerHTML=`<div style="font-family:var(--pixel);color:#888;font-size:18px;padding:12px">No scores yet!</div>`;return;}
  el.innerHTML=board.map((e,i)=>`<div class="lb-row ${i===0?'lb-first':i===1?'lb-second':i===2?'lb-third':''}"><span class="lb-rank">${i+1}</span><span class="lb-name">${e.name}</span><span class="lb-score">${e.score.toLocaleString()}</span><span class="lb-time">${fmtTime(e.time)}</span></div>`).join('');
}
async function submitScore(isVictory){
  const inp=document.getElementById('pname');const name=(inp&&inp.value.trim())||'Anonymous';
  const board=await saveScore(name);renderBoard(board);
  const btn=document.getElementById('submit-score-btn');if(btn){btn.textContent='[ SAVED ✓ ]';btn.disabled=true;}
  const formEl=document.querySelector('.ne-form');
  if(formEl)formEl.innerHTML=`<div style="font-family:var(--pixel);font-size:20px;color:#00ff00">Score saved!</div><button class="btn" style="margin-top:12px" onclick="init()">[ PLAY AGAIN ]</button>`;
}

function init(){
  A={lives:3,floor:0,choices:genChoices(),done:new Set(),screen:'intro',gtype:null,gs:null,undoStack:[],moves:0,sel:null,winOverlay:false,
     score:0,timerStart:null,timerElapsed:0,timerRunning:false,tpStreak:0,paused:false,
     gold:0,inventory:[],shopItems:[],shopGoldEarned:0,shopGoldBreakdown:[],
     floorStartLives:3,floorUndosUsed:0,floorStartTime:0,floorStartScore:0,
     itemMode:null,bonusUndos:0,revealAllUntil:0,hintUntil:0,hints:[],hintTargets:[],
     toolboxCard:null,toolboxUses:0,extraFreecell:false,pickerOverlay:null};
  render();
}

// Live timer tick
setInterval(()=>{
  if(!A||!A.timerRunning)return;
  const tp=document.getElementById('timer-pane');if(tp)tp.textContent='⏱ '+fmtTime(getElapsed());
  const sp=document.getElementById('score-pane');if(sp)sp.textContent='★ '+(A.score||0).toLocaleString()+' pts';
  // Auto-clear hint glow when expired
  if(A.hintUntil&&Date.now()>A.hintUntil){A.hints=[];A.hintTargets=[];A.hintUntil=0;document.querySelectorAll('.hint-glow,.hint-target').forEach(el=>{el.classList.remove('hint-glow','hint-target');});}
  // Auto-clear reveal when expired
  if(A.revealAllUntil&&Date.now()>A.revealAllUntil){A.revealAllUntil=0;document.querySelectorAll('.x-revealed').forEach(el=>el.classList.remove('x-revealed'));}
},1000);

window.startFromIntro=startFromIntro;
window.addEventListener('DOMContentLoaded',init);
window.addEventListener('resize',()=>{if(A.screen==='game'){const s=getS();applyS(s);}else render();});
window.addEventListener('fb-ready',()=>{const el=document.getElementById('map-lb-body');if(el)loadBoard().then(board=>{const tmp=document.getElementById('map-lb-body');if(tmp)renderMapBoard(tmp,board);});});
window.startGame=startGame;window.undoMove=undoMove;window.newShuffle=newShuffle;window.abandonGame=abandonGame;
window.nextFloor=nextFloor;window.init=init;window.instaWin=instaWin;window.submitScore=submitScore;
window.togglePause=togglePause;window.buyItem=buyItem;window.leaveShop=leaveShop;
window.activateItem=activateItem;window.cancelItemMode=cancelItemMode;
</script>
