name: Deploy to GitHub Pages
on:
  push:
    branches: [main, elie]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          path: site

      - name: Checkout elie branch
        uses: actions/checkout@v4
        with:
          ref: elie
          path: site/elie
        continue-on-error: true

      - name: Remove nested .git dirs
        run: |
          rm -rf site/.git
          rm -rf site/elie/.git

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
